name: Documentation

permissions:
  contents: write
  pages: write
  pull-requests: write
  id-token: write

on:
  pull_request_target:
    types: [opened, reopened, synchronize] # Handles forked PRs
  push:
    branches:
      - main # docs are built only on push to main branch, for feature branches there are PR builds
  merge_group:
    types: [checks_requested]
  release:
    types: [created]

jobs:
  pre_docs:
    runs-on: ubuntu-latest
    steps:
      - name: Create distributed
        run: |
          mkdir -p bla
          echo test > bla/test.txt
          cat bla/test.txt
      - uses: actions/upload-artifact@v4
        with:
          name: test
          path: ./bla
      - name: Show workspace
        run: |
          pwd
          echo "$GITHUB_WORKSPACE"
          ls -Rali
  docs:
    needs: pre_docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: test
      - run: |
          ls -Rali .
